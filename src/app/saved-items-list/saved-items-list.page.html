        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">Save Items</strong>
        </ion-col>
        <ion-col style="text-align: end;" (click)="showSearch()">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <app-commonsearch class="animated-display" *ngIf="searchFlag"></app-commonsearch>

  <div style="margin-left: 5px;">
    <ion-segment value="allevent" [(ngModel)]="infoSegment">
      <ion-segment-button value="mall">
        <ion-label style="font-size: x-small;color:white;">Mall</ion-label>
      </ion-segment-button>
      <ion-segment-button value="broadcast" (click)="load_saved_broadcast()">
        <ion-label style="font-size: x-small;color:white;">Broadcast</ion-label>
      </ion-segment-button>
      <ion-segment-button value="whatsnew" >
        <ion-label style="font-size: x-small;color:white;">What's New</ion-label>
      </ion-segment-button>
    </ion-segment>
  </div>
  <div [ngSwitch]="infoSegment">
    <div class="card-gap" *ngSwitchCase="'mall'">
      <ion-grid>
        <ion-row>
          <ion-col size="6">
            <ion-card class="saved-items-card">
              <ion-card-header> 
                <ion-card-title>
                  <!-- <img src="{{imageURL}}{{property.PROPERTY_IMG}}" alt="" class="img-banner"> -->
                  <img src="../../../assets/oppophone.webp" alt="" class="img-banner">
                </ion-card-title>
                <span class="name-text">Oppo A55</span><br>
              </ion-card-header>
              <ion-card-content style="margin-top: -28px;">
                <span style="float:left;font-size: smaller;">Good condition 6 gb ram 125 storage...</span>
                <ion-icon name="location-outline" style="float:left;color: red;margin-top: 5px;"></ion-icon><span style="font-size: x-small;">Mumbai</span>
                <ion-row>
                  <ion-col>
                    <span style="float:left;font-size: x-small;">05 Apr,2024</span>
                  </ion-col>
                  <ion-col>
                    <ion-badge class="badge-color" mode="ios"><ion-icon name="arrow-forward-outline" style="float:right;color: black;"></ion-icon></ion-badge>
                  </ion-col>
                </ion-row>
              </ion-card-content>
            </ion-card>
          </ion-col>
          <ion-col size="6">
            <ion-card class="saved-items-card">
              <ion-card-header> 
                <ion-card-title>
                  <img src="../../../assets/byke.avif" alt="" class="img-banner">
                </ion-card-title>
                <span class="name-text">Royal Enfield Hunter</span><br>
              </ion-card-header>
              <ion-card-content style="margin-top: -28px;">
                <span style="float:left;font-size: smaller;">Hunter 350 Brand new condition...</span>
                <ion-icon name="location-outline" style="float:left;color: red;margin-top: 5px;"></ion-icon><span style="font-size: x-small;">Thane</span>
                <ion-row>
                  <ion-col>
                    <span style="float:left;font-size: x-small;">05 Apr,2024</span>
                  </ion-col>
                  <ion-col>
                    <ion-badge class="badge-color" mode="ios"><ion-icon name="arrow-forward-outline" style="float:right;color: black;"></ion-icon></ion-badge>
                  </ion-col>
                </ion-row>
              </ion-card-content>
            </ion-card>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
    <div class="card-gap" *ngSwitchCase="'broadcast'">
      <ion-grid>
        <ion-row>
          <ion-col size="12" >
            <ion-card  class="broadcast-card" style="background-color: #efefef;margin-top: 0px;" *ngFor="let data of broadcast_list" > <!--[ngStyle]="{'background-color': getBackgroundColor(i)}" -->
              <h6 style="padding-left: 10px;color:#000000" (click)="goToBroadcastDetails(data.id)">{{data.BROADCAST__TITLE}}</h6>
               <p style="padding: 10px;margin-top:-16px;color:#5c5a5f;font-size: small;" (click)="goToBroadcastDetails(data.id)"> {{data.BROADCAST__DESCRIPTION}}</p>
               <!-- <span style="float: right;color:#3180ea;padding-right:20px;padding-bottom:13px;margin-top: -15px;" (click)="shareDetails(data.id)">Share</span><ion-icon name="arrow-redo-outline" style="float: right;color:#3180ea;margin-top: -13px;"></ion-icon> -->
            </ion-card>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
  </div>
</ion-content>
<app-commonfooter></app-commonfooter>
