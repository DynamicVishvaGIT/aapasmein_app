  <div class="ion-padding-top ion-padding-horizontal">
    <ion-grid>
      <ion-row>
        <ion-col size="1">
          <ion-icon name="arrow-back-outline" style="color:black;font-size: x-large;" (click)="dismiss()"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center;">
          <strong class="header" style="color:black;">Add Samvaad</strong>
        </ion-col>
        <!-- <ion-col style="text-align: end;">
          <ion-icon name="search-outline"  style="color:black;margin-right: 7px;"></ion-icon>
        </ion-col> -->
      </ion-row>
    </ion-grid>
  </div>
  <div class="form-div">
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">aapasmein Samvaad</ion-label>
          <div class="input-group">
            <ion-textarea class="input-box" type="text" rows="5" [(ngModel)]="samvaad" (ngModelChange)="checkWordLimit()" placeholder="Please type here...We value your feeedback and suggestion/s for our platforom. Please mention your suggestion/s in bullet points so that it is easier for us to process and act upon, thank you."></ion-textarea>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <ion-text *ngIf="wordCount > 50" color="danger">You can not enter more than 50 words.</ion-text>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-button  type="submit" class="custom_button" style="margin-top: 50px;" (click)="add_samvaad()"><b>Submit</b></ion-button>
    </ion-row>
  </div>
</ion-content>
