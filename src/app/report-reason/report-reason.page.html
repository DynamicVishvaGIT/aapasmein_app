<ion-header>
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-button (click)="dismissModal()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="content-container">
    <h2 class="heading">{{ heading }}</h2>
  <div class="sub-heading">
    {{ subHeading }}
  </div>
  <ion-list>
    <ion-radio-group [(ngModel)]="selectedReason" (ionChange)="onReasonChange($event)">
      <ion-item *ngFor="let reason of reasons" (click)="selectedReason = reason">
        <ion-label>{{ reason }}</ion-label>
        <ion-radio slot="start" [value]="reason"></ion-radio>
      </ion-item>
    </ion-radio-group>
  </ion-list>
  <div *ngIf="selectedReason === 'Other'" ><!--class="textarea-container"-->
    <div class="input-container">
      <ion-label class="input-label required">Reason</ion-label>
      <div class="input-group">
        <ion-textarea class="input-box" type="text" rows="5" maxlength="200" [(ngModel)]="otherReasonText"></ion-textarea> <!--maxlength="50"-->
      </div>
    </div>
    <!-- Show character counter -->
    <ion-text style="float: right;" [ngClass]="{ 'over-limit': (otherReasonText.length || 0) >= 200 }">
      {{ otherReasonText.length || 0 }}/200
    </ion-text>
    <!-- <ion-textarea
      placeholder="Please specify your reason"
      [(ngModel)]="otherReasonText"
    ></ion-textarea> -->
  </div>
  </div>
  <ion-footer>
    <ion-button type="submit" class="custom_button" (click)="report_users()">Submit</ion-button>
  </ion-footer>
</ion-content>
