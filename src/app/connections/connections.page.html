<ion-content>
  <div class="honeycomb-overlay"></div>
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start; margin-left: 10px;" >
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;" (click)="dismiss()"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">Connections</strong>
        </ion-col>
        <ion-col style="text-align: end;">
              
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <div class="card-gap" *ngFor="let connection of connections; let i = index">
    <ion-grid>
      <ion-row>
        <ion-col size="12" [ngClass]="{'align-right': i % 2 === 0, 'align-left': i % 2 !== 0}">
          <div class="card-wrapper" [ngClass]="{'left-card': i % 2 !== 0, 'right-card': i % 2 === 0}">
            <div class="index-container" *ngIf="i % 2 === 0">
              <div class="index-circle"><b>{{ i + 1 }}</b></div>
              <div class="dotted-line"></div>
            </div>
            <ion-card [ngClass]="{ 'mall-card': connection.NAME != search_name, 'selected-mall-card': connection.NAME == search_name }">
              <ion-card-content>
                <ion-row>
                  <ion-col size="4">
                    <img src="../../../assets/Prasenjit_Chanda.png" alt="" class="circle-img">
                  </ion-col>
                  <ion-col size="8">
                    <span style="margin-left: -38px;">{{connection.NAME}}</span><br>
                    <!-- <span style="margin-left: -62px;font-size: x-small;">{{connection.MOBILE_NO}}</span> -->
                  </ion-col>
                </ion-row>
              </ion-card-content>
            </ion-card>
            <div class="index-container" *ngIf="i % 2 !== 0">
              <div class="dotted-line"></div>
              <div class="index-circle"><b>{{ i + 1 }}</b></div>
            </div>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
