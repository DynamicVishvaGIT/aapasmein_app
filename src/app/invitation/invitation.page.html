<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-row >
      <ion-col size="1" style="text-align: start;margin-left: 10px;">
        <ion-icon name="arrow-back" style="color:white;" (click)="back()"></ion-icon>
      </ion-col>
      <ion-col size="7" style="text-align: start;margin-top: -3px;">
        <strong class="header" style="color:white;">Invite a friend to aapasmein !</strong>
      </ion-col>
      <ion-col class="tooltip-container" (click)="toggleTooltip()">
        <ion-icon name="help-circle-outline" class="help_icon"></ion-icon>
        <span class="tooltip-text" *ngIf="showTooltip">This is your tooltip message</span>
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="honeycomb-overlay"></div>
  <div id="container" >
    <div class="watermark"></div>
  </div>
  <div class="ion-padding form-div">
    <ion-grid>
      <ion-row>
        <ion-col size="12">
          <div class="input-container" [class.focused]="friend.full_name || inputFocused">
            <ion-label class="input-label required">Full Name</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" [(ngModel)]="friend.full_name"  (ionFocus)="onFocus()" (ionBlur)="onBlur()"></ion-input>
            </div>
        </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
            <div class="input-container" [class.focused]="friend.email || inputFocused">
              <ion-label class="input-label required">Email</ion-label>
              <div class="input-group">
                <ion-input class="input-box" type="text" [(ngModel)]="friend.email" (ionFocus)="onFocus()" (ionBlur)="onBlur()"></ion-input>
              </div>
            </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
            <div class="input-container" [class.focused]="friend.mobile_number || inputFocused">
                <ion-label class="input-label required">Mobile Number</ion-label>
                <div class="input-group">
                  <ion-input class="input-box" type="number" [(ngModel)]="friend.mobile_number" (ionFocus)="onFocus()" (ionBlur)="onBlur()"></ion-input>
                </div>
            </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="6">
            <div class="input-container" [class.focused]="friend.city || inputFocused">
                <!-- <ion-label class="input-label required">State</ion-label> -->
                <ion-label class="input-label required">City</ion-label>
                <div class="input-group">
                    <!-- <ion-select class="ion-select" [(ngModel)]="friend.city" (ionChange)="load_location()">
                      <ion-select-option *ngFor="let item of get_cities" [value]="item.id">{{item.NAME}}</ion-select-option>
                    </ion-select> -->
                    <ion-input [value]="selectedStateName" readonly (click)="openStatePopover($event)"></ion-input>
                </div>
            </div>
        </ion-col>
        <!-- Popover for Searchable Dropdown -->
        <ion-popover #statePopover [isOpen]="isStatePopoverOpen" (didDismiss)="isStatePopoverOpen = false">
          <ng-template>
            <ion-content class="popover-content">
                <ion-searchbar [(ngModel)]="searchStateTerm" (ionInput)="filterStates()"></ion-searchbar>
                <ion-list>
                <ion-item *ngFor="let item of filteredStates" (click)="selectState(item)">
                    {{ item.NAME }}
                </ion-item>
                </ion-list>
            </ion-content>
          </ng-template>
        </ion-popover>
        <ion-col size="6">
            <div class="input-container" [class.focused]="friend.location || inputFocused">
                <!-- <ion-label class="input-label required">District</ion-label> -->
                <ion-label class="input-label required">Location</ion-label>
                <div class="input-group">
                    <!-- <ion-select class="ion-select" [(ngModel)]="friend.location">
                      <ion-select-option *ngFor="let item of get_locations" [value]="item.id">{{item.NAME}}</ion-select-option>
                    </ion-select> -->
                    <ion-input [value]="selectedDistrictName" readonly (click)="openDistrictPopover($event)"></ion-input>
                </div>
            </div>
        </ion-col>
        <!-- Popover for Searchable Dropdown -->
        <ion-popover #districtPopover [isOpen]="isDistrictPopoverOpen" (didDismiss)="isDistrictPopoverOpen = false">
          <ng-template>
            <ion-content class="popover-content">
                <ion-searchbar [(ngModel)]="searchDistrictTerm" (ionInput)="filterDistricts()"></ion-searchbar>
                <ion-list>
                <ion-item *ngFor="let item of filteredDistricts" (click)="selectDistrict(item)">
                    {{ item.NAME }}
                </ion-item>
                </ion-list>
            </ion-content>
          </ng-template>
        </ion-popover>

        <!-- <ion-col size="6">
          <div class="input-container" [class.focused]="selectedInterests.length > 0 || inputFocused">
            <ion-label class="input-label required">Interest</ion-label>
            <div class="input-group">
              <ion-input [value]="selectedInterestNames" readonly (click)="openInterestPopover($event)"></ion-input>
            </div>
          </div>
        </ion-col>
        <ion-popover #interestPopover [isOpen]="isInterestPopoverOpen" (didDismiss)="closeInterestPopover()">
          <ng-template>
            <ion-content class="popover-content">
              <ion-searchbar [(ngModel)]="searchInterestTerm" (ionInput)="filterInterests()"></ion-searchbar>

                  <ion-checkbox slot="start" [checked]="isSelected(item)"></ion-checkbox>
                  <ion-label>{{ item.NAME }}</ion-label>
                </ion-item>
              </ion-list>
              <ion-button expand="full" (click)="closeInterestPopover()">Done</ion-button>
            </ion-content>
          </ng-template>
        </ion-popover> -->
      </ion-row>
      <ion-row>
        <ion-col size="12">
          <ion-button  type="submit" class="custom_button" (click)="onInvite()"><b>Next</b></ion-button>
        </ion-col>
    </ion-row>
    </ion-grid>
  </div>

  <!-- Invited Friend List -->
  <!-- <div class="invited-friends"> -->
    <!-- <h3>Invited Friends</h3> -->
    <ion-accordion-group expand="inset" mode="ios" value="accordian1" class="accordian-align" *ngIf="accepted_data.length>0">
      <ion-accordion value="accordian1" class="custom-accordion">
        <ion-item slot="header" lines="none">
          <ion-label class="label">Invited Friend</ion-label>
        </ion-item>
        <div class="ion-padding" slot="content">
          <ion-card class="invited-card" *ngFor="let data of accepted_data">
            <ion-grid>
              <ion-row>
                <ion-col size="3">
                  <img src="{{imageUrl}}{{data?.PROFILE_IMAGE}}" alt="" class="img-card" *ngIf="data.PROFILE_IMAGE">
                  <img src="../../assets/avtar4.png" alt="" class="img-card" *ngIf="!data.PROFILE_IMAGE">
                </ion-col>
                <ion-col size="9">
                  <span class="name-section">{{data?.NAME}}</span><br>
                  <span class="other-section">{{data?.MOBILE_NO}}</span><br>
                  <span class="other-section">{{data?.EMAIL_ID}}</span><br>
                  <span class="other-section">{{data.PROFESSION__NAME}}</span>
                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-card>
        </div>
      </ion-accordion>
    </ion-accordion-group>
    <br>
    <br>
    <br>

</ion-content>

<app-commonfooter url="invitation"></app-commonfooter>
