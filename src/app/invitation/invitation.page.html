<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-row >
      <ion-col size="1" style="text-align: start;margin-left: 10px;">
        <ion-icon name="arrow-back" style="color:white;" (click)="back()"></ion-icon>
      </ion-col>
      <ion-col size="7" style="text-align: start;margin-top: -3px;">
        <strong class="header" style="color:white;">Invite a friend to aapasmein !</strong>
      </ion-col>
      <ion-col>
        <ion-icon name="help-circle-outline" class="help_icon"></ion-icon>
      </ion-col>
    </ion-row>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="honeycomb-overlay"></div>
  <div id="container" >
    <div class="watermark"></div>
  </div>
  <div class="ion-padding form-div">
    <ion-grid>
      <ion-row>
        <ion-col size="12">
          <div class="input-container" [class.focused]="friend.full_name || inputFocused">
            <ion-label class="input-label required">Full Name</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" [(ngModel)]="friend.full_name"  (ionFocus)="onFocus()" (ionBlur)="onBlur()"></ion-input>
            </div>
        </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
            <div class="input-container" [class.focused]="friend.email || inputFocused">
              <ion-label class="input-label required">Email</ion-label>
              <div class="input-group">
                <ion-input class="input-box" type="text" [(ngModel)]="friend.email" (ionFocus)="onFocus()" (ionBlur)="onBlur()"></ion-input>
              </div>
            </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
            <div class="input-container" [class.focused]="friend.mobile_number || inputFocused">
                <ion-label class="input-label required">Mobile Number</ion-label>
                <div class="input-group">
                  <ion-input class="input-box" type="number" [(ngModel)]="friend.mobile_number" (ionFocus)="onFocus()" (ionBlur)="onBlur()"></ion-input>
                </div>
            </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="6">
            <div class="input-container" [class.focused]="friend.city || inputFocused">
                <ion-label class="input-label required">City</ion-label>
                <div class="input-group">
                    <ion-select class="ion-select" [(ngModel)]="friend.city">
                      <ion-select-option *ngFor="let item of get_cities" [value]="item.id">{{item.NAME}}</ion-select-option>
                    </ion-select>
                </div>
            </div>
        </ion-col>
        <ion-col size="6">
            <div class="input-container" [class.focused]="friend.location || inputFocused">
                <ion-label class="input-label required">Location</ion-label>
                <div class="input-group">
                    <ion-select class="ion-select" [(ngModel)]="friend.location">
                      <ion-select-option *ngFor="let item of get_locations" [value]="item.id">{{item.NAME}}</ion-select-option>
                    </ion-select>
                </div>
            </div>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="12">
          <ion-button  type="submit" class="custom_button" (click)="onInvite()"><b>Next</b></ion-button>
        </ion-col>
    </ion-row>
    </ion-grid>
  </div>
</ion-content>

<app-commonfooter url="invitation"></app-commonfooter>
