<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- <div class="honeycomb-overlay"></div> -->
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start;" (click)="dismiss()">
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">{{category_name}} Events</strong>
        </ion-col>
        <!-- <ion-col style="text-align: end;" (click)="showSearch()">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col> -->
      </ion-row>
    </ion-grid>
  </div>
  <!-- <app-commonsearch class="animated-display" *ngIf="searchFlag"></app-commonsearch> -->
  <!-- <div >
    <ion-button class="button-property" size="small" color="tertiary" (click)="addEvent()" style="text-transform: none;"><ion-icon name="add-outline"></ion-icon>Create Event</ion-button>
  </div> -->
  <div class="gap">
    <ion-grid>
      <ion-row>
        <ion-col size="6" *ngFor="let data of list">
          <ion-card class="event-card" (click)="goToDetails(data, 'all')">
            <ion-card-header class="card-header-img"> 
              <img src="{{imageUrl}}{{data.event_image}}" alt="" class="img-banner1">
            </ion-card-header>
              <ion-row>
                <ion-col size="6">
                  <span style="float:left;font-size: 9px;color:#000000;font-weight: 500;">{{data.from_date | date:'dd MMMM, yyyy'}}</span>
                </ion-col>
                <ion-col size="6" style="margin-top: -6px;">
                  <span style="font-size: 9px;color:#ee6737;font-weight: 500;">{{data.from_time}}</span>
                </ion-col>
              </ion-row>
              <ion-row style="margin-top: -9px;">
                <ion-col>
                  <span style="float:left;font-size:small;color:#000000;font-weight: 700;">{{data.event_name?.substring(0,18)}}<span *ngIf="data.event_name?.length>=18">...</span></span>
                </ion-col>
              </ion-row>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <br>
  <br>
  <br>
</ion-content>

<app-commonfooter [activeEventColor]="true"></app-commonfooter>
