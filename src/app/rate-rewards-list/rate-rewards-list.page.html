<ion-content>
  <!-- <div class="honeycomb-overlay"></div> -->
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start;" (click)="dismiss()">
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">aapasmein Recognition</strong>
        </ion-col>
        <!-- <ion-col style="text-align: end;" (click)="showSearch()">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col> -->
      </ion-row>
    </ion-grid>
  </div>
  <!-- <app-commonsearch class="animated-display" *ngIf="searchFlag"></app-commonsearch> -->
  <!-- <div >
    <ion-button class="button-property" size="small" color="tertiary" (click)="addRateRewardsPage()"><ion-icon name="add-outline"></ion-icon>Add</ion-button>
  </div> -->
  <ion-searchbar [(ngModel)]="searchQuery" mode="ios" class="custom" (ionInput)="filterList()" placeholder="Search Recognition" (click)="hideFooter()"></ion-searchbar>
  <div class="gap">
    <ion-grid  *ngIf="dataLoaded && filteredList.length > 0">
      <ion-row *ngFor="let data of filteredList">
        <ion-col size="3">
          <img src="{{imageUrl}}{{data.PROFILE_IMAGE}}" alt="" class="circle-img" *ngIf="data.PROFILE_IMAGE">
          <img src="../../assets/avtar4.png" alt="" class="circle-img" *ngIf="!data.PROFILE_IMAGE">
        </ion-col>
        <ion-col size="9" class="border-bottom">
          <ion-row>
            <ion-col size="10">
              <span class="name-text">{{data.NAME}}</span><br>
            </ion-col>
            <ion-col size="2">
              <ion-badge class="badge-color" mode="md" (click)="addRateRewardsPage('103191')"><ion-icon name="star-outline" style="font-size: smaller;padding-top: 2px;"></ion-icon>&nbsp;Rate now</ion-badge>
            </ion-col>
          </ion-row>
          <ion-row>
            <ion-col size="10">
              <span class="designation-text">{{data.PROFESSION__NAME}}</span>
            </ion-col>
            <ion-col  size="2" (click)="add_handshake(data)">
              <ion-badge class="shake-align" mode="md" style="margin-top: -4px;" ><img src="assets/accolades/deal.png" class="menu-icon1"></ion-badge>
            </ion-col>
          </ion-row>
        </ion-col>
      </ion-row>
    </ion-grid>
    <div class="no-data" *ngIf="dataLoaded && filteredList.length == 0">
      <img class="watermark-image" src="../../assets/no-data-found.png" alt="No Data">
      <span class="no-data-text">No Recognition Data</span>
    </div>
  </div>
  <br>
  <br>
  <br>
</ion-content>

<app-commonfooter *ngIf="isFooterVisible"></app-commonfooter>
