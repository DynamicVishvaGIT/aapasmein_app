<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <div class="honeycomb-overlay"></div>
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start; margin-left: 10px;" >
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;" (click)="dismiss()"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">aapasmein Advantage</strong>
        </ion-col>
        <!-- <ion-col style="text-align: end;" (click)="showSearch()">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col> -->
      </ion-row>
    </ion-grid>
  </div>

  <div class="card-gap">
    <ion-searchbar [(ngModel)]="searchQuery" mode="ios" class="custom" (ionInput)="filterList($event)" placeholder="Search Profession" (click)="hideFooter()"></ion-searchbar>
    <ion-grid *ngIf="dataLoaded && filteredList.length>0">
      <ion-row> 
        <ion-col size="6" *ngFor="let data of filteredList">
          <ion-card class="mall-card" (click)="viewAdvantageDetails(data)">
            <div class="honeycomb-overlay"></div>
            <ion-card-content  class="card-content-custom">
              <!-- IMAGE -->
              <div class="image-section">
                <img  src="../../../assets/icon/dashboard/developer.svg" alt="" class="img-avatar">
              </div>
              <!-- TEXT -->
              <div class="text-section">
                <span class="text-align">{{data.NAME}}</span>
              </div>
              <!-- BOTTOM BUTTON -->
              <div class="bottom-section">
                <ion-badge class="badge-color" mode="ios">
                  <ion-icon name="arrow-forward-outline" style="color: black;"></ion-icon>
                </ion-badge>
              </div>

                </ion-col>
              </ion-row> -->
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-infinite-scroll (ionInfinite)="loadNextChunk($event)">
