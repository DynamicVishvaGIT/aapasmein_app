<ion-content>
  <div class="honeycomb-overlay"></div>
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start;" (click)="dismiss()">
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">Events</strong>
        </ion-col>
        <ion-col style="text-align: end;">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <div >
    <ion-button class="button-property" size="small" color="tertiary" (click)="addEvent()"><ion-icon name="add-outline"></ion-icon>Add</ion-button>
  </div>
  <div class="gap">
    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <div class="selected-button-card">
            <ion-row>
              <ion-col size="12" style="text-align: center;padding: 9px;">
                <span style="font-size: smaller;">Personal</span>
              </ion-col>
            </ion-row>
          </div>
        </ion-col>
        <ion-col size="6">
          <div class="button-card">
            <ion-row>
              <ion-col size="12" style="text-align: center;padding: 9px;">
                <span style="font-size: smaller;">Promoted</span>
              </ion-col>
            </ion-row>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
