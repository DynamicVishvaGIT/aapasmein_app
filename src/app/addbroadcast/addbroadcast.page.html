<ion-content [fullscreen]="true">
  <div class="ion-padding-top ion-padding-horizontal">
    <ion-grid>
      <ion-row>
        <ion-col size="1">
          <ion-icon name="arrow-back-outline" style="color:black;font-size: x-large;" (click)="dismiss()"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center;margin-top: -3px;">
          <strong class="header" style="color:black;">Add Broadcast</strong>
        </ion-col>
        <ion-col style="text-align: end;">
          <ion-icon name="search-outline"  style="color:black;margin-right: 7px;"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <div class="form-div">
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Title</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" [(ngModel)]="broadcastJson.title"></ion-input>
            </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Description</ion-label>
          <div class="input-group">
            <ion-textarea class="input-box" type="text" rows="15" [(ngModel)]="broadcastJson.description"></ion-textarea>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row style="margin-left: 7px;margin-top: 14px;">
      <span style="color:black" class="required">Share With</span>
    </ion-row>
    <ion-row>
      <ion-col size="6">
        <ion-button class="answer-btn after_click">
          <ion-grid>
              <ion-col >
                <ion-radio-group [allowEmptySelection]="true" [(ngModel)]="broadcastJson.share_with" (ionChange)="onRadioSelect('your_connection')">
                  <ion-radio 
                  value="your_connection"
                  color="tertiary"
                  justify="space-between" 
                  labelPlacement="end" 
                  style="font-size: xx-small;"
                  [ngClass]="{'radio-selected': broadcastJson.share_with === 'your_connection', 'radio-unselected': broadcastJson.share_with !== 'your_connection'}"
                  >Your Connection</ion-radio>
                </ion-radio-group>  <!--(ionSelect)="onRadioSelect('1st')"-->
              </ion-col>
          </ion-grid>
        </ion-button>
      </ion-col>
      <ion-col size="6">
        <ion-button class="answer-btn after_click">
          <ion-grid>
              <ion-col>
                <ion-radio-group [allowEmptySelection]="true" [(ngModel)]="broadcastJson.share_with" (ionChange)="onRadioSelect('public')">
                  <ion-radio 
                  value="public" 
                  color="tertiary" 
                  justify="space-between" 
                  labelPlacement="end" 
                  style="font-size: xx-small;"
                  [ngClass]="{'radio-selected': broadcastJson.share_with === 'public', 'radio-unselected': broadcastJson.share_with !== 'public'}"
                  >Public</ion-radio>
                </ion-radio-group><!--(ionSelect)="onRadioSelect('2nd')"-->
              </ion-col>
          </ion-grid>
        </ion-button>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <!-- <ion-item lines="none" mode="md"  class="ion-item"> -->
          <ion-checkbox color="tertiary" #same [(ngModel)]="acceptTerms"></ion-checkbox>&nbsp;&nbsp;   <!--[(ngModel)]="acceptTerms"-->
          <ion-label style="color:black;">I have read all the T&C and Code of Conduct of the platform and agree to abide by the same.</ion-label>
        <!-- </ion-item> -->
      </ion-col>
    </ion-row>
    <!-- <ion-row>
      <ion-icon name="information-circle" style="color:#fe9800"></ion-icon><p style="color: #000000;margin-top: -14px;margin-left: 32px;font-size: x-small;">If you want to share publicly, You need to spend your XP points.*</p>
    </ion-row> -->
    <ion-row>
      <ion-button  type="submit" class="custom_button" style="margin-top: 50px;" [disabled]="!acceptTerms || disabled" (click)="add_broadcast()"><b>Post</b></ion-button>
    </ion-row>
  </div>
  <br>
  <br>
  <br>
  <br>
  <br>
  <br>
</ion-content>

<!-- <app-commonfooter></app-commonfooter> -->
