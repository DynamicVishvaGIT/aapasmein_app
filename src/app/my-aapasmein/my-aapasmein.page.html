<ion-content>
  <!-- <div class="honeycomb-overlay"></div> -->
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start;" >
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;" (click)="dismiss()"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">My aapasmein</strong>
        </ion-col>
        <!-- <ion-col style="text-align: end;" (click)="showSearch()">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col> -->
      </ion-row>
    </ion-grid>
  </div>
  <!-- <app-commonsearch class="animated-display" *ngIf="searchFlag"></app-commonsearch> -->
  <!-- <div >
    <ion-button class="button-property" size="small" color="tertiary" (click)="addYellowPage()"><ion-icon name="add-outline"></ion-icon>Add</ion-button>
  </div> -->
  <div class="card-gap">
    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-card class="mall-card" (click)="goToActivity()">
            <ion-card-header> 
              <ion-card-title>
                <span style="color:black;font-size: 10px;margin-top: 3px;font-weight: 300;">Aapasmein Connect Log</span><br>
              </ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <ion-row>
                <ion-col size="12" style="text-align: center;">
                  <img src="assets/icon/features/activity.png" alt="" class="img-avatar img_align">
                </ion-col>
              </ion-row>
            </ion-card-content>
          </ion-card>
        </ion-col>
        <ion-col size="6">
          <ion-card class="mall-card" (click)="goToMyDeals()">
            <ion-card-header> 
              <ion-card-title>
                <span style="color:black; font-size: 10px; font-weight: 300;">My Deals</span><br>
                <!-- <span style="color:black; font-size: 10px; font-weight: 300;display: block;">Request</span> -->
              </ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <ion-row>
                <ion-col size="12" style="text-align: center;">
                  <img src="assets/icon/features/deal.svg" alt="" class="img-avatar">
                </ion-col>
              </ion-row>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
      <ion-row>
        <ion-col size="6">
          <ion-card class="mall-card" (click)="goToSavedItems()">
            <ion-card-header> 
              <ion-card-title>
                <span style="color:black; font-size: 10px; font-weight: 300;">Saved Items</span><br>
                <!-- <span style="color:black; font-size: 10px; font-weight: 300;display: block;">Request</span> -->
              </ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <ion-row>
                <ion-col size="12" style="text-align: center;">
                  <img src="assets/icon/features/saveditems.png" alt="" class="img-avatar">
                </ion-col>
              </ion-row>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  
</ion-content>

<app-commonfooter></app-commonfooter>
