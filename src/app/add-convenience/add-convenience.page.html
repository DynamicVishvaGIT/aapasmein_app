  <div class="form-div">
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Name</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" [(ngModel)]="convenienceJson.convenience_name"></ion-input>
            </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Profession</ion-label>
          <div class="input-group">
            <ion-select class="ion-select" [(ngModel)]="convenienceJson.category_id">
              <ion-select-option *ngFor="let item of get_categories" [value]="item.id">{{item.NAME}}</ion-select-option>
            </ion-select>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Specialization ( Keywords )</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" [(ngModel)]="convenienceJson.profession"></ion-input>
            </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Mobile Number</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" inputmode="numeric" maxLength="10" [(ngModel)]="convenienceJson.mobile_no"></ion-input>
            </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label required">Location</ion-label>
          <div class="input-group">
            <ion-input class="input-box" type="text" [(ngModel)]="convenienceJson.location" (ionInput)="updateGeoLocationSearchResults()"></ion-input>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row *ngIf="autocompleteItems.length>0">
      <ion-col>
        <ion-list [hidden]="autocompleteItems.length === 0">
          <ion-item *ngFor="let item of autocompleteItems" tappable (click)="selectGeoLocationSearchResult(item)">
            {{ item.description }}
          </ion-item>
        </ion-list>
      </ion-col>
    </ion-row>

    <ion-row style="padding: 3px;">
      <ion-col size="12">
        <ion-checkbox color="tertiary" #same [(ngModel)]="acceptTerms"></ion-checkbox>&nbsp;&nbsp;   <!--[(ngModel)]="acceptTerms"-->
        <ion-label style="color:black;font-size: 14px;">The above information is accurate as per my knowledge.</ion-label>
      </ion-col>
    </ion-row>
    <ion-row class="row-align">
      <ion-button  type="submit" class="custom_button" [disabled]="!acceptTerms || disabled" (click)="add_convenience()"><b>Send Link</b></ion-button>
    </ion-row>
  </div>
</ion-content>
