<ion-content [fullscreen]="true">
  <div class="ion-padding-top ion-padding-horizontal">
    <ion-grid>
      <ion-row>
        <ion-col size="1">
          <ion-icon name="arrow-back-outline" style="color:white;margin-top: 20px;font-size: x-large;" (click)="backToSearch()"></ion-icon>
        </ion-col>
        <ion-col size="11">
          <ion-searchbar placeholder="Search in aapasmein" mode="ios" class="custom" [(ngModel)]="searchText"  (keyup.enter)="search_keyword()" ></ion-searchbar>  <!--(click)="onSearch($event,'click')" (keyup.enter)="onSearch($event,'type')" (ionInput)="trending_searches()" -->
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <ion-row style="margin-left: 33px;margin-top: 12px;" *ngIf="dataLoaded && searched_events.length > 0">
    <span style="font-weight: 600;color:white">Events</span>
  </ion-row>
  <div class="gap" *ngIf="dataLoaded && searched_events.length > 0">
    <ion-grid>
      <ion-row class="scroll">
        <ion-col size="8" *ngFor="let event of searched_events"  (click)="goToDetails(event,'all')">
          <ion-card class="event-card">
            <ion-card-header class="card-header-img"> 
              <img src="{{eventImageUrl}}{{event.EVENT_IMAGE}}" alt="" class="img-banner1">
            </ion-card-header>
              <ion-row >
                <ion-col>
                  <span style="float:left;font-size:small;color:#000000;font-weight: 700;">{{event.EVENT_NAME}}</span>
                </ion-col>
              </ion-row>
              <ion-row style="margin-top: 10px;">
                <ion-col size="4">
                  <img src="{{eventImageUrl}}{{event.USER__PROFILE_IMAGE}}" alt="" class="circle-img1">
                </ion-col>
                <ion-col size="8">
                  <span style="margin-left: -38px;color:#0f1f49;font-size: 9px;">{{event.USER__NAME}}</span>
                </ion-col>
                <!-- <ion-col size="4"> -->
                  <!-- <ion-button class="interested-button" [color]="event.interest==true?'danger':'tertiary'">
                    <ion-icon name="calendar-outline"></ion-icon>&nbsp;<span style="font-size: 10px;">{{event.interest==true?'Cancelled':'Interested'}}</span>
                  </ion-button> -->
                <!-- </ion-col> -->
              </ion-row>
            <!-- </ion-card-content> -->
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <ion-row style="margin-left: 33px;margin-top: 12px;" *ngIf="dataLoaded && searched_products.length>0">
    <span style="font-weight: 600;color:white">Deals</span>
  </ion-row>
  <div class="gap" *ngIf="dataLoaded && searched_products.length>0">
    <ion-grid>
      <ion-row class="scroll">
        <ion-col size="6" *ngFor="let data of searched_products;" (click)="goToMallDetails(data,'search')">
          <ion-card class="mall-card" >
            <ion-card-header> 
              <ion-card-title>
                <!-- <img src="{{imageURL}}{{property.PROPERTY_IMG}}" alt="" class="img-banner"> -->
                <!-- <img src="{{../../../assets/laptop.jpg}}" alt="" class="img-banner"> -->
                <swiper class="mySwiper" data-loop="true" [config]="config" (swiper)="setSwiperInstance($event)">
                  <ng-template swiperSlide *ngFor="let img of data.PRODUCT_IMAGES">
                    <img src="{{eventImageUrl}}{{img}}" alt="" class="img-banner">
                  </ng-template>
                </swiper>
              </ion-card-title>
              <!-- <span style="color:black;font-size: medium;margin-top: 3px;font-weight: 500;">{{data.product_name}}</span><br> -->
              <span style="color:black;font-size: 12px;margin-top: 3px;font-weight: 500;">{{data.PRODUCT_NAME.substring(0,15)}}<span *ngIf="data.PRODUCT_NAME.length>=15">...</span></span><br>
            </ion-card-header>
            <!-- <ion-card-content style="margin-top: -28px;">
              <ion-icon name="location-outline" style="float:left;color: red;margin-top: 5px;"></ion-icon><span style="font-size: x-small;">{{data.location}}</span>
              <ion-row>
                <ion-col size="10">
                  <span style="float:left;font-size: 10px;color:blue;">{{data.date}}</span>
                </ion-col>
                <ion-col size="2" (click)="goToMallDetails(data,'dashboard')">
                  <ion-badge class="badge-color" mode="ios"><ion-icon name="arrow-forward-outline" style="float:right;color: black;"></ion-icon></ion-badge>
                </ion-col>
              </ion-row>
            </ion-card-content> -->
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <div class="no-data" *ngIf="dataLoaded && searched_events.length == 0 && searched_products.length==0 && searched_users.length==0">
    <img class="watermark-image" src="../../assets/no-data-found.png" alt="No Data">
    <span class="no-data-text">No Searched Data</span>
