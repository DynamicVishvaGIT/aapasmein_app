<ion-content [fullscreen]="true">
  <div class="ion-padding-top ion-padding-horizontal">
    <ion-grid>
      <ion-row>
        <ion-col size="1">
          <ion-icon name="arrow-back-outline" style="color:black;font-size: x-large;" (click)="dismiss()"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center;margin-top: -3px;">
          <strong class="header" style="color:black;">Add Yellow Page</strong>
        </ion-col>
        <ion-col style="text-align: end;">
          <ion-icon name="search-outline"  style="color:black;margin-right: 7px;"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <div class="form-div">
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Full Name</ion-label>
            <div class="input-group">
              <ion-input class="input-box" type="text" ></ion-input>
            </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="6">
        <div class="input-container">
          <ion-label class="input-label">City</ion-label>
            <div class="input-group">
              <ion-select>
                <ion-select-option>Asansol</ion-select-option>
                <ion-select-option>Durgapur</ion-select-option>
              </ion-select>
            </div>
          </div>
      </ion-col>
      <ion-col size="6">
        <div class="input-container">
          <ion-label class="input-label">Location</ion-label>
            <div class="input-group">
              <ion-select>
                <ion-select-option>Asansol</ion-select-option>
                <ion-select-option>Durgapur</ion-select-option>
              </ion-select>
            </div>
          </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Phone Number</ion-label>
          <div class="input-group">
            <ion-input class="input-box" type="text" ></ion-input>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Email</ion-label>
          <div class="input-group">
            <ion-input class="input-box" type="email" ></ion-input>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="6">
        <div class="input-container">
          <ion-label class="input-label">Profession</ion-label>
            <div class="input-group">
              <ion-select>
                <ion-select-option>Asansol</ion-select-option>
                <ion-select-option>Durgapur</ion-select-option>
              </ion-select>
            </div>
          </div>
      </ion-col>
      <ion-col size="6">
        <div class="input-container">
          <ion-label class="input-label">Specialization</ion-label>
            <div class="input-group">
              <ion-select>
                <ion-select-option>Asansol</ion-select-option>
                <ion-select-option>Durgapur</ion-select-option>
              </ion-select>
            </div>
          </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Interest</ion-label>
          <div class="input-group">
            <ion-select class="ion-select">
              <ion-select-option>Asansol</ion-select-option>
              <ion-select-option>Durgapur</ion-select-option>
            </ion-select>
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-button  type="submit" class="custom_button" style="margin-top:50px"><b>Submit</b></ion-button>
    </ion-row>
  </div>
  <br>
  <br>
  <br>
  <br>
</ion-content>

<app-commonfooter></app-commonfooter>
