<ion-content>
  <!-- <div class="honeycomb-overlay"></div> -->
  <div class="ion-padding-top ion-padding-horizontal" style="background: #061947;">
    <ion-grid>
      <ion-row>
        <ion-col size="1" style="text-align: start;" (click)="dismiss()">
          <ion-icon name="arrow-back-outline" style="color:white;font-size: x-large;"></ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center; margin-top: -3px;">
          <strong class="header" style="color:white;">Connections List</strong>
        </ion-col>
        <ion-col style="text-align: end;" (click)="showSearch()">
          <ion-icon name="search-outline" style="color:white; margin-right: 7px;"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
  <app-commonsearch class="animated-display" *ngIf="searchFlag"></app-commonsearch>
  <div class="gap">
    <div *ngIf="dataLoaded && connections.length > 0">
      <ion-grid>
        <ion-row class="border-bottom" *ngFor="let data of connections" (click)="goToProfileDetails(data.id, data.MOBILE_NO)">
          <ion-col size="3" >
            <img src="../../assets/avtar3.jpeg" alt="" class="circle-img" *ngIf="!data.PROFILE_IMAGE">
            <img src="{{imageUrl}}{{data.PROFILE_IMAGE}}" alt="" class="circle-img" *ngIf="data.PROFILE_IMAGE">
          </ion-col>
          <ion-col size="9">
            <span class="name-text">{{data.NAME}}</span><br>
            <span class="designation-text">{{data.PROFESSION__NAME}}</span><br>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
    <div class="no-data" *ngIf="dataLoaded && connections.length == 0">
      <img class="watermark-image" src="../../assets/no-data-found.png" alt="No Data">
      <span class="no-data-text">No Connection Data</span>
    </div>
  </div>
  <br>
  <br>
  <br>
</ion-content>

<app-commonfooter></app-commonfooter>
