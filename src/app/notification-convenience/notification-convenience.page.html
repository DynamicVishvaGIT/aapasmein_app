<ion-content>

  <!-- HEADER -->
  <div class="ion-padding-top ion-padding-horizontal">
    <ion-grid>
      <ion-row>
        <ion-col size="1">
          <ion-icon name="arrow-back-outline"
            style="color:black;font-size: x-large;margin-top: -5px;"
            (click)="close()">
          </ion-icon>
        </ion-col>
        <ion-col size="9" style="text-align: center;margin-top: -3px;">
          <strong class="header" style="color:black;">
            Convenience Details
          </strong>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!-- IMAGE -->
  <div class="profile-section">
    <div class="profile-img">
      <img [src]="imageUrl + notification_data?.CONVENIENCE_IMAGE || 'assets/default-user.png'" />
    </div>
  </div>
  <!-- DETAILS -->
  <div class="form-div">
    <!-- <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Added By</ion-label>
          <div class="input-group readonly">
            {{ notification_data?.added_by || '-' }}
          </div>
        </div>
      </ion-col>
    </ion-row> -->
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Name</ion-label>
          <div class="input-group readonly">
            {{ notification_data?.CONVENIENCE_NAME || '-' }}
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Category</ion-label>
          <div class="input-group readonly">
            {{ notification_data?.CATEGORY__NAME || '-' }}
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Profession</ion-label>
          <div class="input-group readonly">
            {{ notification_data?.PROFESSION || '-' }}
          </div>
        </div>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col size="12">
        <div class="input-container">
          <ion-label class="input-label">Mobile Number</ion-label>
          <div class="input-group readonly">
            {{ notification_data?.MOBILE_NO || '-' }}
          </div>
        </div>
      </ion-col>
    </ion-row>
  </div>
  <div class="action-footer">
    <ion-button class="accept-btn" (click)="approve_convenience('accept')">
      Accept
    </ion-button>
    <ion-button class="reject-btn" fill="outline" (click)="approve_convenience('reject')">
      Reject
    </ion-button>
  </div>
  <!-- <ion-badge class="badge-color-accept" mode="md" style="margin-top: -18px;" *ngIf="notification.type=='accepted_convenience' && notification.USER_APPROVED == false" (click)="approve_convenience(notification, 'accept', category.key)">Accept</ion-badge>
  <ion-badge class="badge-color-reject" mode="md" style="margin-right: 6px;margin-top: -18px;"  *ngIf="notification.type=='accepted_convenience' && notification.USER_APPROVED == false" (click)="approve_convenience(notification, 'reject', category.key)">Reject</ion-badge> -->
</ion-content>
